<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Alpha Freshman Tutorial</title>
    <link rel="stylesheet" href="elearning.css">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AlphaFT">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo.png">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="home.html" class="logo-container">
                <span class="platform-name">Alpha Freshman Tutorial</span>
            </a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Start your learning journey today</p>
            
            <form id="registerForm" class="auth-form">
                <div id="errorMessage" style="display: none; color: #e74c3c; background: #fadbd8; padding: 10px; border-radius: 5px; margin-bottom: 15px;"></div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="At least 6 characters">
                    <div style="margin-top:8px">
                        <div style="height:4px;background:#eee;border-radius:4px;overflow:hidden">
                            <div id="strengthBar" style="height:100%;width:0;transition:all 0.3s;border-radius:4px"></div>
                        </div>
                        <span id="strengthText" style="font-size:0.75rem;margin-top:4px;display:block"></span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>
                
                <div class="form-group">
                    <label for="role">Register as</label>
                    <select id="role" class="form-select">
                        <option value="student">Student</option>
                        <option value="instructor">Instructor</option>
                    </select>
                </div>
                
                <label class="checkbox-label">
                    <input type="checkbox" id="terms" required>
                    I agree to the Terms of Service and Privacy Policy
                </label>
                
                <button type="submit" class="btn btn-large btn-block">Create Account</button>
                
                <div class="auth-divider">
                    <span>OR</span>
                </div>
                
                <button type="button" class="btn btn-social btn-google">
                    🔍 Sign up with Google
                </button>
                
                <p class="auth-footer">
                    Already have an account? <a href="auth-login.html" class="link">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="api.js"></script>
    <script src="notifications.js"></script>
    <script src="ai-assistant.js"></script>
    <script src="auth-register.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
