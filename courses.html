<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Platform - Courses</title>
    <link rel="stylesheet" href="elearning.css">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AlphaFT">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo.png">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="home.html" class="logo-container">
                <span class="platform-name">Alpha Freshman Tutorial</span>
            </a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="dashboard.html">My Learning</a></li>
                <li><a href="study-hub.html">📚 Study Hub</a></li>
                <li><a href="department-guide.html">🎓 Departments</a></li>
                <li><button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button></li>
                <li><a href="auth-login.html" class="btn-nav-login">Login</a></li>
                <li><a href="auth-register.html" class="btn-nav-register">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h2>Explore Courses</h2>
            <p>Learn new skills at your own pace</p>
        </section>

        <div class="filters-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search courses, topics, instructors...">
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:0.5rem">
                <div class="category-filters" style="margin-bottom:0">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="semester1">Semester 1</button>
                    <button class="filter-btn" data-category="semester2">Semester 2</button>
                    <button class="filter-btn" data-category="natural">Natural</button>
                    <button class="filter-btn" data-category="social">Social</button>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span id="courseCount" style="font-size:0.85rem;color:var(--text-secondary)"></span>
                    <select id="sortSelect" style="padding:7px 12px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:0.85rem;cursor:pointer">
                        <option value="newest">Newest</option>
                        <option value="rating">Top Rated</option>
                        <option value="students">Most Popular</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="courses-grid" id="coursesGrid"></div>
    </main>

    <script src="theme.js"></script>
    <script src="api.js"></script>
    <script src="offline-db.js"></script>
    <script src="notifications.js"></script>
    <script src="main.js"></script>
    <script src="search.js"></script>
    <script src="ai-assistant.js"></script>
    <script src="courses.js"></script>
    <div class="dev-credit">© 2026 Alpha Freshman Tutorial · Developed by <strong>Rehima Ali</strong></div>
    <script src="/pwa.js"></script>
</body>
</html>
