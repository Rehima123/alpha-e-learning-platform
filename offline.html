<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Alpha Freshman Tutorial</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
        }
        .icon { font-size: 5rem; margin-bottom: 1.5rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        h1 { font-size: 1.8rem; margin-bottom: 0.8rem; }
        p  { opacity: 0.85; line-height: 1.7; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
            margin: 6px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .cached-section { margin-top: 2rem; text-align: left; }
        .cached-section h3 { font-size: 1rem; opacity: 0.8; margin-bottom: 1rem; }
        .cached-link {
            display: block;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .cached-link:hover { background: rgba(255,255,255,0.2); }
        #status { margin-top: 1rem; font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>No internet connection detected. You can still access cached courses and your learning progress.</p>

        <button class="btn" onclick="window.location.reload()">🔄 Try Again</button>
        <a href="/courses.html" class="btn">📚 Cached Courses</a>
        <a href="/dashboard.html" class="btn">📊 My Progress</a>

        <div class="cached-section">
            <h3>📂 Available Offline:</h3>
            <a href="/home.html" class="cached-link">🏠 Home Page</a>
            <a href="/courses.html" class="cached-link">📚 Course Catalog</a>
            <a href="/dashboard.html" class="cached-link">📊 My Learning Dashboard</a>
            <a href="/auth-login.html" class="cached-link">🔐 Login</a>
        </div>

        <div id="status">Checking connection...</div>
    </div>

    <script>
        // Auto-redirect when back online
        window.addEventListener('online', () => {
            document.getElementById('status').textContent = '✅ Back online! Redirecting...';
            setTimeout(() => window.history.back(), 1500);
        });

        if (navigator.onLine) {
            document.getElementById('status').textContent = '✅ Connection restored';
            setTimeout(() => window.history.back(), 1000);
        } else {
            document.getElementById('status').textContent = '❌ No internet connection';
        }
    </script>
</body>
</html>
